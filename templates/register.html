<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizPlus AI - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body, html {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            background: linear-gradient(
              170deg,
              #2d7dd2 0%,
              #4a9ee8 20%,
              #74b9e8 40%,
              #a8d4f0 60%,
              #c8e6f5 75%,
              #dff0f8 88%,
              #eef7fc 100%
            );
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Pure CSS Clouds */
        .cloud-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.55);
            border-radius: 50px;
            filter: blur(18px);
        }

        .cloud-1 { width: 520px; height: 120px; top: 15%; left: -5%; animation: floatCloud1 28s linear infinite; }
        .cloud-2 { width: 380px; height: 90px; top: 25%; left: 60%; animation: floatCloud2 22s linear infinite; }
        .cloud-3 { width: 650px; height: 140px; top: 55%; left: -10%; animation: floatCloud3 35s linear infinite; }
        .cloud-4 { width: 300px; height: 80px; top: 10%; left: 30%; animation: floatCloud1 18s linear infinite reverse; }
        .cloud-5 { width: 480px; height: 110px; top: 68%; left: 50%; animation: floatCloud2 30s linear infinite; }
        .cloud-6 { width: 280px; height: 70px; top: 40%; left: 70%; animation: floatCloud3 25s linear infinite reverse; }

        .wisp {
            position: absolute;
            background: rgba(255, 255, 255, 0.30);
            border-radius: 100px;
            filter: blur(25px);
        }

        .wisp-1 { width: 800px; height: 40px; top: 30%; left: -100px; transform: rotate(-8deg); animation: floatCloud2 40s ease-in-out infinite; }
        .wisp-2 { width: 600px; height: 30px; top: 48%; left: 200px; transform: rotate(-8deg); animation: floatCloud1 50s ease-in-out infinite; }
        .wisp-3 { width: 700px; height: 35px; top: 62%; left: -50px; transform: rotate(-5deg); animation: floatCloud3 45s ease-in-out infinite; }
        .wisp-4 { width: 500px; height: 25px; top: 20%; left: 400px; transform: rotate(-8deg); animation: floatCloud2 38s ease-in-out infinite reverse; }

        @keyframes floatCloud1 {
            0%   { transform: translateX(0px) translateY(0px); }
            25%  { transform: translateX(15px) translateY(-8px); }
            50%  { transform: translateX(30px) translateY(0px); }
            75%  { transform: translateX(15px) translateY(8px); }
            100% { transform: translateX(0px) translateY(0px); }
        }
        @keyframes floatCloud2 {
            0%   { transform: translateX(0px) translateY(0px); }
            33%  { transform: translateX(-20px) translateY(10px); }
            66%  { transform: translateX(20px) translateY(-10px); }
            100% { transform: translateX(0px) translateY(0px); }
        }
        @keyframes floatCloud3 {
            0%   { transform: translateX(0px) scale(1); }
            50%  { transform: translateX(25px) scale(1.03); }
            100% { transform: translateX(0px) scale(1); }
        }

        /* Glassmorphism Auth Card */
        .auth-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 24px;
            padding: 50px 45px;
            width: 440px; /* Slightly wider */
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
            
            /* Animation */
            opacity: 0;
            transform: translateY(30px);
            animation: cardFadeIn 0.9s ease-out forwards;
        }

        @keyframes cardFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-logo {
            text-align: center;
            color: #ffffff;
            font-size: 0.85rem;
            letter-spacing: 3px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .auth-heading {
            text-align: center;
            font-size: 2rem;
            font-weight: 300;
            color: #1a1a1a;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .auth-subtext {
            text-align: center;
            font-size: 0.9rem;
            color: #333333;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 14px; /* 14px gap */
        }

        .glass-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.55);
            border: 1px solid rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 14px 20px;
            color: #1a1a1a;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .glass-input::placeholder {
            color: #666666;
        }

        .glass-input:focus {
            border-color: rgba(0,0,0,0.30);
            background: rgba(255,255,255,0.75);
        }

        .error-message {
            display: none;
            color: #cc0000;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 10px;
        }

        .btn-submit {
            width: 100%;
            background: rgb(249, 168, 196); /* pastel pink */
            color: #1a1a1a;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            letter-spacing: 3px;
            font-weight: 600;
            margin-top: 24px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(249, 168, 196, 0.4);
        }

        .divider {
            color: rgba(0,0,0,0.30);
            margin: 24px 0;
            text-align: center;
            font-size: 0.8rem;
        }

        .auth-footer {
            color: #333333;
            font-size: 0.88rem;
            text-align: center;
        }

        .auth-footer a {
            color: #000000;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <!-- Cloud layers -->
    <div class="cloud-layer">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
        <div class="cloud cloud-5"></div>
        <div class="cloud cloud-6"></div>
        <div class="wisp wisp-1"></div>
        <div class="wisp wisp-2"></div>
        <div class="wisp wisp-3"></div>
        <div class="wisp wisp-4"></div>
    </div>

    <div class="auth-card">
        <div class="auth-logo">BIZPLUS AI</div>
        <h1 class="auth-heading">Create Account</h1>
        <p class="auth-subtext">Start managing your business smarter</p>

        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="shop_name" class="glass-input" placeholder="Shop Name (e.g. Sharma General Store)" required>
            </div>
            <div class="input-group">
                <input type="text" id="username" class="glass-input" placeholder="Choose a Username" required>
            </div>
            <div class="input-group">
                <input type="email" id="email" class="glass-input" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" class="glass-input" placeholder="Create Password" required>
            </div>
            <div class="input-group">
                <input type="password" id="confirm_password" class="glass-input" placeholder="Confirm Password" required>
            </div>
            
            <div id="errorMsg" class="error-message"></div>

            <button type="submit" class="btn-submit">GET STARTED</button>
        </form>

        <div class="divider">──────  or  ──────</div>

        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const shop_name = document.getElementById('shop_name').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (!shop_name || !username || !email || !password) {
                errorMsg.textContent = 'All fields are required';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (password !== confirm_password) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ shop_name, username, email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    // Check if error contains UNIQUE constraint failure
                    if (data.error.includes('UNIQUE constraint failed: users.username')) {
                        errorMsg.textContent = 'Username already taken';
                    } else if (data.error.includes('UNIQUE constraint failed: users.email')) {
                        errorMsg.textContent = 'Email already registered';
                    } else {
                        errorMsg.textContent = 'Registration failed. Please try again.';
                    }
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Please try again.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
